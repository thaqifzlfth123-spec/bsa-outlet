<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSA Outlet - Member Verification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid login-section">
    <div class="row min-vh-100">

        <div class="col-lg-6 d-none d-lg-flex hero-section">
            <div>
                <h1>BSA Outlet</h1>
                <p>Join our membership</p>
            </div>
        </div>

        <div class="col-lg-6 d-flex align-items-center justify-content-center">

            <div class="login-card">

                <h2 class="text-center mb-3">Get a Verification</h2>

                <p class="text-center text-muted mb-4">
                    Become a member to enjoy special updates and better shopping experience.
                </p>

                <form id="memberForm">

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" placeholder="Enter your name" required>
                    </div>

                    <div class="mb-4">
                        <label>Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 mb-3">
                        Send Verification
                    </button>

                    <a href="home.html" class="btn btn-outline-dark w-100">
                        Skip for Now
                    </a>

                </form>

            </div>

        </div>

    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
