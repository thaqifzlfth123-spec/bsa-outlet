<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSA Outlet - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid login-section">
    <div class="row min-vh-100">

        <!-- Left Side -->
        <div class="col-lg-6 d-none d-lg-flex hero-section">
            <div>
                <h1>BSA Outlet</h1>
                <p>Find Your Taste</p>
            </div>
        </div>

        <!-- Right Side -->
        <div class="col-lg-6 d-flex align-items-center justify-content-center">

            <div class="login-card">

                <h2 class="text-center mb-4">Sign In</h2>

                <!-- Customer / Staff -->
                <div class="btn-group w-100 mb-4">
                    <input type="radio" class="btn-check" name="userType" id="customer" checked>
                    <label class="btn btn-outline-warning" for="customer">
                        Customer
                    </label>

                    <input type="radio" class="btn-check" name="userType" id="staff">
                    <label class="btn btn-outline-warning" for="staff">
                        Staff
                    </label>
                </div>

                <form id="loginForm">

                    <div class="mb-3">
                        <label>Email / Username</label>
                        <input type="text"
                               class="form-control"
                               placeholder="Enter email or username"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password"
                               class="form-control"
                               placeholder="Enter password"
                               required>
                    </div>

                    <div class="d-flex justify-content-between mb-4">

                        <div>
                            <input type="checkbox">
                            Remember Me
                        </div>

                        <a href="#" class="link-warning">
                            Forgot Password?
                        </a>

                    </div>

                    <button type="submit"
                            class="btn btn-warning w-100">
                        Sign In
                    </button>

                </form>

                <div class="text-center mt-4">
                    Don't have an account?
                    <a href="register.html" class="link-warning">
                        Register Now
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
