<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSA Outlet - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid login-section">
    <div class="row min-vh-100">

        <div class="col-lg-6 d-none d-lg-flex hero-section">
            <div>
                <h1>BSA Outlet</h1>
                <p>Create your account</p>
            </div>
        </div>

        <div class="col-lg-6 d-flex align-items-center justify-content-center">

            <div class="login-card">

                <h2 class="text-center mb-4">Registration</h2>

                <div class="btn-group w-100 mb-4">
                    <input type="radio" class="btn-check" name="userType" id="customer" checked>
                    <label class="btn btn-outline-warning" for="customer">Customer</label>

                    <input type="radio" class="btn-check" name="userType" id="staff">
                    <label class="btn btn-outline-warning" for="staff">Staff</label>
                </div>

                <form id="registerForm">

                    <div class="mb-3">
                        <label>Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your full name" required>
                    </div>

                    <div class="mb-3">
                        <label>Email / No. Phone</label>
                        <input type="text" class="form-control" placeholder="Enter email or phone number" required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="Create password" required>
                    </div>

                    <div class="mb-3">
                        <label>Verification Code</label>
                        <div class="input-group">
                            <input type="text" class="form-control" placeholder="Enter code">
                            <button type="button" class="btn btn-outline-warning" onclick="getCode()">
                                Get Code
                            </button>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning w-50">Send</button>
                        <button type="reset" class="btn btn-outline-dark w-50">Clear</button>
                    </div>

                </form>

                <div class="text-center mt-4">
                    Already have an account?
                    <a href="index.html" class="link-warning">Sign In</a>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
