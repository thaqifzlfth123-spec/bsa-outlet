<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSA Outlet - Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="home.html">BSA Outlet</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="menswear.html">Menswear</a></li>
                <li class="nav-item"><a class="nav-link" href="womenswear.html">Womenswear</a></li>
                <li class="nav-item"><a class="nav-link" href="kids.html">Kids</a></li>
                <li class="nav-item"><a class="nav-link" href="shoe.html">Shoe</a></li>
                <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-header">
    <div class="container text-center">
        <h1>Cart</h1>
        <p>Review your selected items before payment.</p>
    </div>
</section>

<section class="container py-5">

    <div class="info-box mb-4" id="customerInfoBox">
        <p><strong>Customer ID:</strong> Loading...</p>
        <p><strong>Date:</strong> <span id="currentDate"></span></p>
    </div>

    <div class="table-responsive cart-table-box">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Unit Price (RM)</th>
                    <th>Total (RM)</th>
                </tr>
            </thead>

            <tbody id="cartTableBody">
                <!-- Cart items will be loaded here dynamically -->
            </tbody>
        </table>
    </div>

    <div class="cart-summary mt-4" id="cartSummary">
        <!-- Summary will be loaded here -->
    </div>

    <div class="d-flex gap-2 mt-4 flex-column flex-md-row">
        <button class="btn btn-outline-dark w-100" onclick="clearCart()">Clear Cart</button>
        <button class="btn btn-warning w-100" onclick="checkout()">Confirm Payment</button>
    </div>

</section>

<footer class="footer">
    <p>© 2026 BSA Outlet. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
